# Monitoring stack: Prometheus + Grafana + cAdvisor
#
# Start AFTER the main stack:
#   docker-compose up -d
#   docker-compose -f load-tests/docker-compose.monitoring.yml up -d
#
# Dashboards:
#   Grafana   → http://localhost:3000  (admin / admin)
#   Prometheus → http://localhost:9090

networks:
  # Join the same network as the application services
  backend:
    external: true

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    networks: [backend]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    networks: [backend]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # cAdvisor collects per-container CPU, memory, network, and I/O metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    networks: [backend]
    ports:
      - "8088:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg

volumes:
  prometheus_data:
  grafana_data:
